version: "3.8"

services:
  db:
    image: postgres:15
    container_name: videovinyl_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - videovinyl_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: videovinyl_backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - videovinyl_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: videovinyl_frontend
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    networks:
      - videovinyl_network
    restart: unless-stopped

networks:
  videovinyl_network:
    driver: bridge

volumes:
  postgres_data:
